name: Manually Publish Docker Images

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Docker image tag"
        required: true
        default: "dev"
      service:
        description: "Target to build (all or a specific service)"
        type: choice
        default: "all"
        options:
          - all
          - frontend
          - server
          - garmin
          - mcp

jobs:
  push_to_registries:
    name: Push Docker image to multiple registries
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
      attestations: write
      id-token: write

    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Frontend ─────────────────────────────────────────────────────────────
      - name: Metadata frontend
        id: meta-frontend
        if: ${{ inputs.service == 'all' || inputs.service == 'frontend' }}
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ secrets.DOCKER_USERNAME }}/sparkyfitness
            ghcr.io/${{ github.repository }}-frontend
          tags: |
            type=raw,value=${{ inputs.tag }}

      - name: Build and push frontend
        id: push-frontend
        if: ${{ inputs.service == 'all' || inputs.service == 'frontend' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.frontend
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate artifact attestation Frontend
        if: ${{ inputs.service == 'all' || inputs.service == 'frontend' }}
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/${{ github.repository }}-frontend
          subject-digest: ${{ steps.push-frontend.outputs.digest }}
          push-to-registry: true

      # ── Server ────────────────────────────────────────────────────────────────
      - name: Metadata server
        id: meta-server
        if: ${{ inputs.service == 'all' || inputs.service == 'server' }}
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ secrets.DOCKER_USERNAME }}/sparkyfitness_server
            ghcr.io/${{ github.repository }}-server
          tags: |
            type=raw,value=${{ inputs.tag }}

      - name: Build and push server
        id: push-server
        if: ${{ inputs.service == 'all' || inputs.service == 'server' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.backend
          push: true
          tags: ${{ steps.meta-server.outputs.tags }}
          labels: ${{ steps.meta-server.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate artifact attestation server
        if: ${{ inputs.service == 'all' || inputs.service == 'server' }}
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/${{ github.repository }}-server
          subject-digest: ${{ steps.push-server.outputs.digest }}
          push-to-registry: true

      # ── Garmin Microservice ───────────────────────────────────────────────────
      - name: Metadata Garmin Microservice
        id: meta-garmin
        if: ${{ inputs.service == 'all' || inputs.service == 'garmin' }}
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ secrets.DOCKER_USERNAME }}/sparkyfitness_garmin
            ghcr.io/${{ github.repository }}-garmin
          tags: |
            type=raw,value=${{ inputs.tag }}

      - name: Build and push Garmin Microservice
        id: push-garmin
        if: ${{ inputs.service == 'all' || inputs.service == 'garmin' }}
        uses: docker/build-push-action@v6
        with:
          context: SparkyFitnessGarmin
          file: docker/Dockerfile.garmin_microservice
          push: true
          tags: ${{ steps.meta-garmin.outputs.tags }}
          labels: ${{ steps.meta-garmin.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate artifact attestation Garmin Microservice
        if: ${{ inputs.service == 'all' || inputs.service == 'garmin' }}
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/${{ github.repository }}-garmin
          subject-digest: ${{ steps.push-garmin.outputs.digest }}
          push-to-registry: true

      # ── MCP Server ────────────────────────────────────────────────────────────
      - name: Metadata MCP Server
        id: meta-mcp
        if: ${{ inputs.service == 'all' || inputs.service == 'mcp' }}
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ secrets.DOCKER_USERNAME }}/sparkyfitness_mcp
            ghcr.io/${{ github.repository }}-mcp
          tags: |
            type=raw,value=${{ inputs.tag }}

      - name: Build and push MCP Server
        id: push-mcp
        if: ${{ inputs.service == 'all' || inputs.service == 'mcp' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.mcp
          push: true
          tags: ${{ steps.meta-mcp.outputs.tags }}
          labels: ${{ steps.meta-mcp.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate artifact attestation MCP Server
        if: ${{ inputs.service == 'all' || inputs.service == 'mcp' }}
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/${{ github.repository }}-mcp
          subject-digest: ${{ steps.push-mcp.outputs.digest }}
          push-to-registry: true
